<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Methods in Accounting & Finance - Complete Question Bank</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --background: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
            --text-muted: #4b5563;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--background);
            padding-bottom: 10px;
        }

        .progress-container {
            background-color: var(--background);
            border-radius: 20px;
            height: 8px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--primary-light);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats-tracker {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .hint-button {
            background: none;
            border: none;
            color: var(--primary-light);
            cursor: pointer;
            font-weight: 500;
            padding: 0;
            margin-bottom: 15px;
            display: block;
            font-size: 0.9rem;
        }

        .hint-text {
            background-color: #eff6ff;
            border-left: 4px solid var(--primary-light);
            padding: 10px 15px;
            margin-bottom: 20px;
            border-radius: 0 6px 6px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            display: none;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: var(--surface);
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f9fafb;
            border-color: var(--primary-light);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #ecfdf5;
            border-color: var(--success);
            color: #065f46;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: #fef2f2;
            border-color: var(--danger);
            color: #991b1b;
        }

        .rationale-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            display: none;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            float: right;
            transition: background-color 0.2s;
        }

        .action-btn:hover {
            background-color: #1d4ed8;
        }

        .action-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .results-container {
            text-align: center;
            display: none;
        }

        .score-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <h1 id="quiz-title">Research Methods Mastery Bank</h1>
        <div class="stats-tracker">

        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>

        <div class="question-text" id="question-text">Loading...</div>
        
        <button class="hint-button" id="hint-btn" onclick="toggleHint()">💡 Show Hint</button>
        <div class="hint-text" id="hint-text"></div>

        <div class="options-list" id="options-list"></div>
        <div class="rationale-box" id="rationale-box"></div>
        
        <button class="action-btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
        <div style="clear: both;"></div>
    </div>

    <div id="results-screen" class="results-container">
        <h1>Evaluation Complete</h1>
        <p>Your performance across the complete question bank:</p>
        <div class="score-display" id="score-display">0 / 44</div>
        <p id="feedback-text" style="font-size: 1.1rem; font-weight: 500; color: var(--text-muted);"></p>
        <button class="action-btn" style="float: none; margin-top: 20px;" onclick="restartQuiz()">Restart Examination</button>
    </div>
</div>

                    { "text": "Field research", "rationale": "Field work captures events directly within their natural, operating real-world habitat without setting up artificial labs.", "isCorrect": true },
                    { "text": "Desk research", "rationale": "Desk methods aggregate existing secondary data files directly from an office workstation.", "isCorrect": false }
                ],
                "hint": "Identify the standard terminology used when an investigator leaves artificial environments to study events in their natural setting."
            },
            {
                "question": "In qualitative interviewing, why is it structurally inaccurate to say that a researcher should 'avoid follow-up' questions?",
                "answerOptions": [
                    { "text": "Because avoiding follow-ups is only required in quantitative surveys, not qualitative research.", "rationale": "Quantitative setups utilize standardized constraints; qualitative tracks intentionally leverage flexible dialogs.", "isCorrect": false },
                    { "text": "Because follow-up questions are essential in qualitative research to probe deeper into unexpected insights and ensure data saturation.",
                      "rationale": "Qualitative semi-structured interactions count on responsive probing to dig under superficial phrases and expose core structural meanings.", "isCorrect": true },
                    { "text": "Because follow-up questions are the only way to calculate a p-value.", "rationale": "Qualitative research maps text data streams, avoiding the computation of significance tests.", "isCorrect": false },
                    { "text": "Because avoiding follow-ups makes the interview too long to analyze.", "rationale": "Restricting follow ups cuts dialogue short, trading away vital thematic data depth to save tracking time.", "isCorrect": false }
                ],
                "hint": "Think about the primary target of qualitative interaction: enforcing strict rigid standard checks vs uncovering deep hidden meanings."
            },
            {
                "question": "When presenting final research results, what is the most critical factor a presenter must focus on to ensure their communication is effective?",
                "answerOptions": [
                    { "text": "Presenting every single row of raw data collected to prove transparency.", "rationale": "Massive uncurated data dumps break viewer attention thresholds; deep listings belong inside the appendix files.", "isCorrect": false },
                    { "text": "Tailoring the presentation and results according to the specific background and needs of the audience.",
                      "rationale": "Communication success demands optimizing technical layers, visual models, and metrics depth based on the background profile of the audience.", "isCorrect": true },
                    { "text": "Using the most complex statistical jargon possible to sound authoritative.", "rationale": "Excessive jargon hides key data trends and distances viewers who lack that exact technical specialty track.", "isCorrect": false },
                    { "text": "Focusing exclusively on the history of the university where the research was conducted.", "rationale": "Presentations must track findings and analytical insights, avoiding institutional filler content.", "isCorrect": false }
                ],
                "hint": "Consider how you would reframe your explanation when addressing a board of company managers versus an expert academic review panel."
            }
        ]
    };

    let currentQuestionIndex = 0;
    let score = 0;
    let hintShown = false;

    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const questionText = document.getElementById('question-text');
    const optionsList = document.getElementById('options-list');
    const progressBar = document.getElementById('progress-bar');
    const nextBtn = document.getElementById('next-btn');
    const hintText = document.getElementById('hint-text');
    const hintBtn = document.getElementById('hint-btn');
    const rationaleBox = document.getElementById('rationale-box');
    const scoreDisplay = document.getElementById('score-display');
    const feedbackText = document.getElementById('feedback-text');
    const qNumDisplay = document.getElementById('question-number-display');
    const scoreTrackerDisplay = document.getElementById('score-tracker-display');

    function loadQuestion() {
        hintText.style.display = 'none';
        hintBtn.textContent = "💡 Show Hint";
        hintShown = false;
        rationaleBox.style.display = 'none';
        nextBtn.disabled = true;
        
        const totalQuestions = quizData.questions.length;
        nextBtn.textContent = currentQuestionIndex === totalQuestions - 1 ? "Finish Examination" : "Next Question";
        optionsList.innerHTML = '';

        const currentQuestion = quizData.questions[currentQuestionIndex];
        questionText.textContent = currentQuestion.question;
        hintText.textContent = currentQuestion.hint;
        
        qNumDisplay.textContent = `Question ${currentQuestionIndex + 1} of ${totalQuestions}`;
        scoreTrackerDisplay.textContent = `Score: ${score}`;

        // Update progress bar
        const progressPercentage = (currentQuestionIndex / totalQuestions) * 100;
        progressBar.style.width = `${progressPercentage}%`;

        currentQuestion.answerOptions.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.textContent = option.text;
            button.onclick = () => selectOption(index, button);
            optionsList.appendChild(button);
        });
    }

    function toggleHint() {
        if (!hintShown) {
            hintText.style.display = 'block';
            hintBtn.textContent = "🙈 Hide Hint";
            hintShown = true;
        } else {
            hintText.style.display = 'none';
            hintBtn.textContent = "💡 Show Hint";
            hintShown = false;
        }
    }

    function selectOption(selectedIndex, selectedButton) {
        const currentQuestion = quizData.questions[currentQuestionIndex];
        const buttons = optionsList.getElementsByClassName('option-btn');
        
        for (let btn of buttons) {
            btn.disabled = true;
        }

        const selectedOption = currentQuestion.answerOptions[selectedIndex];
        
        if (selectedOption.isCorrect) {
            selectedButton.classList.add('correct');
            score++;
            scoreTrackerDisplay.textContent = `Score: ${score}`;
        } else {
            selectedButton.classList.add('incorrect');
            currentQuestion.answerOptions.forEach((opt, idx) => {
                if (opt.isCorrect) {
                    buttons[idx].classList.add('correct');
                }
            });
        }

        rationaleBox.textContent = selectedOption.rationale;
        rationaleBox.style.display = 'block';
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        progressBar.style.width = '100%';
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'block';
        
        const totalQuestions = quizData.questions.length;
        scoreDisplay.textContent = `${score} / ${totalQuestions}`;
        
        const successRate = score / totalQuestions;
        if (successRate === 1) {
            feedbackText.textContent = "Perfect score! Exceptional mastery of all advanced research methods and frameworks!";
        } else if (successRate >= 0.85) {
            feedbackText.textContent = "Excellent work! You've shown strong analytical performance across the full curriculum.";
        } else if (successRate >= 0.70) {
            feedbackText.textContent = "Good pass! Review the specific rationales on your incorrect selections to lock in your targets.";
        } else {
            feedbackText.textContent = "Keep training. Re-read the framework texts, utilize your study guide notes, and restart to pass.";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        resultsScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        loadQuestion();
    }

    loadQuestion();
</script>
